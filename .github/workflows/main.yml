name: Build & Release sendbuilds

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [
          x86_64-unknown-linux-gnu,
          i686-unknown-linux-gnu,
          x86_64-pc-windows-gnu,
          i686-pc-windows-gnu,
          x86_64-apple-darwin,
          aarch64-apple-darwin
        ]

    steps:
      # ---------------------------
      # Checkout repository
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------------------------
      # Install Rust
      # ---------------------------
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # ---------------------------
      # Install cross-compilation dependencies for Windows
      # ---------------------------
      - name: Install mingw-w64 for Windows
        if: matrix.target == 'x86_64-pc-windows-gnu' || matrix.target == 'i686-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      # ---------------------------
      # Build the binary
      # ---------------------------
      - name: Build sendbuilds
        run: cargo build --release --target ${{ matrix.target }}

      # ---------------------------
      # Prepare binary and checksum
      # ---------------------------
      - name: Prepare release artifact
        id: prepare_artifact
        run: |
          mkdir -p dist
          ASSET_NAME="sendbuilds-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            ASSET_NAME+=".exe"
          fi
          cp target/${{ matrix.target }}/release/sendbuilds dist/$ASSET_NAME
          # Generate SHA256 checksum
          sha256sum dist/$ASSET_NAME > dist/$ASSET_NAME.sha256
          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT

      # ---------------------------
      # Upload binary + checksum to GitHub Release
      # ---------------------------
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.prepare_artifact.outputs.asset_name }}
            dist/${{ steps.prepare_artifact.outputs.asset_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}