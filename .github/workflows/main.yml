name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: sendbuilds-linux-x86_64.tar.gz
            binary_name: sendbuilds

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: sendbuilds-linux-aarch64.tar.gz
            binary_name: sendbuilds

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: sendbuilds-windows-x86_64.zip
            binary_name: sendbuilds.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: sendbuilds-macos-x86_64.tar.gz
            binary_name: sendbuilds

          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: sendbuilds-macos-aarch64.tar.gz
            binary_name: sendbuilds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (default)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          mkdir -p dist
          PKG_DIR="dist/package"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "target/${{ matrix.target }}/release/sendbuilds.exe" "$PKG_DIR/sendbuilds.exe"
            cp "scripts/install-windows.ps1" "$PKG_DIR/install.ps1"
            powershell -NoProfile -Command "Compress-Archive -Path '$PKG_DIR\\*' -DestinationPath 'dist\\${{ matrix.asset_name }}' -Force"
          else
            cp "target/${{ matrix.target }}/release/sendbuilds" "$PKG_DIR/sendbuilds"
            cp "scripts/install-unix.sh" "$PKG_DIR/install.sh"
            chmod +x "$PKG_DIR/sendbuilds" "$PKG_DIR/install.sh"
            tar -C "$PKG_DIR" -czf "dist/${{ matrix.asset_name }}" .
          fi
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell -NoProfile -Command "$h=(Get-FileHash -Algorithm SHA256 'dist\\${{ matrix.asset_name }}').Hash.ToLower(); '$h  ${{ matrix.asset_name }}' | Out-File -Encoding ascii 'dist\\${{ matrix.asset_name }}.sha256'"
          else
            HASH="$(openssl dgst -sha256 "dist/${{ matrix.asset_name }}" | awk '{print $NF}')"
            printf "%s  %s\n" "$HASH" "${{ matrix.asset_name }}" > "dist/${{ matrix.asset_name }}.sha256"
          fi
          rm -rf "$PKG_DIR"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
