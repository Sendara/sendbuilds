name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: sendbuilds-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: sendbuilds-linux-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: sendbuilds-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            name: sendbuilds-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            name: sendbuilds-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (default)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "target/${{ matrix.target }}/release/sendbuilds.exe" "dist/${{ matrix.name }}"
          else
            cp "target/${{ matrix.target }}/release/sendbuilds" "dist/${{ matrix.name }}"
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
