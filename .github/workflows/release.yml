name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: sendbuilds-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: sendbuilds-linux-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: sendbuilds-windows-x86_64.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            name: sendbuilds-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            name: sendbuilds-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/sendbuilds* dist/${{ matrix.name }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*